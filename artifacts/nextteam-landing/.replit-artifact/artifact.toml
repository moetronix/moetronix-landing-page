kind = "web"
previewPath = "/"
title = "Moetronix Group"
version = "1.0.0"
id = "artifacts/nextteam-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23094

[services.development]
run = "pnpm --filter @workspace/nextteam-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nextteam-landing", "run", "build" ]
publicDir = "artifacts/nextteam-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23094"
BASE_PATH = "/"
